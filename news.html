<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News — Seonghan Kwon</title>
    <meta name="description" content="All news and updates by Seonghan Kwon.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600;800&display=swap"
        rel="stylesheet">

    <style>
        /* ============================ */
        /* 1. 기본 스타일 */
        /* ============================ */
        :root {
            --primary-color: #0f172a;
            --accent-color: #3b82f6;
            --text-dark: #1e293b;
            --text-gray: #475569;
            --bg-glass: rgba(255, 255, 255, 0.65);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: 6.5rem;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background-color: transparent;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: 0.2s;
        }

        ul {
            list-style: none;
        }

        /* 배경 캔버스 */
        #networkCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #ffffff 0%, #f1f5f9 100%);
        }

        /* 네비게이션 */
        header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.5);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
        }

        .logo {
            font-family: 'Fira Code', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            font-weight: 600;
            color: var(--text-gray);
            font-size: 0.95rem;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent-color);
        }

        /* ============================ */
        /* 2. 페이지 헤더 */
        /* ============================ */
        .page-header {
            max-width: 1000px;
            margin: 0 auto;
            padding: 6rem 2rem 2rem;
        }

        .page-header h1 {
            font-family: 'Fira Code', monospace;
            font-size: 2.2rem;
            color: var(--primary-color);
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .page-header h1::before {
            content: '';
            display: block;
            width: 6px;
            height: 32px;
            background: var(--accent-color);
            border-radius: 2px;
        }

        .page-subtitle {
            color: var(--text-gray);
            margin-top: 0.5rem;
            font-size: 1rem;
            padding-left: calc(6px + 0.8rem);
        }

        /* ============================ */
        /* 3. 뉴스 컨테이너 & 아이템 */
        /* ============================ */
        .news-section-page {
            max-width: 1000px;
            margin: 2rem auto 4rem;
            padding: 3rem 2rem;
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .news-item {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 1.5rem;
            padding: 1rem 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-date {
            font-family: 'Fira Code', monospace;
            font-weight: 700;
            color: var(--accent-color);
            font-size: 0.9rem;
        }

        .news-link {
            color: var(--text-dark);
            transition: color 0.2s;
        }

        .news-link:hover {
            color: var(--accent-color);
            text-decoration: underline;
        }

        .news-body {
            display: flex;
            flex-direction: column;
        }

        .news-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 0.5rem;
        }

        .badge-link {
            display: inline-flex;
            align-items: center;
            padding: 0.3rem 0.8rem;
            background: rgba(59, 130, 246, 0.08);
            color: var(--accent-color);
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid rgba(59, 130, 246, 0.2);
            transition: all 0.2s ease;
        }

        .badge-link:hover {
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }

        .badge-link svg {
            width: 14px;
            height: 14px;
            margin-right: 4px;
            fill: currentColor;
            vertical-align: middle;
        }

        /* ============================ */
        /* 4. 푸터 */
        /* ============================ */
        footer {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-gray);
            font-size: 0.9rem;
            border-top: 1px solid #e2e8f0;
            background: white;
        }

        /* ============================ */
        /* 5. 반응형 */
        /* ============================ */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .page-header {
                padding-top: 4rem;
            }

            .page-header h1 {
                font-size: 1.6rem;
            }

            .news-item {
                grid-template-columns: 1fr;
                gap: 0.3rem;
            }
        }
    </style>
</head>

<body>

    <canvas id="networkCanvas"></canvas>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">Seonghan Kwon</a>
            <nav class="nav-links">
                <a href="index.html#about">About</a>
                <a href="news.html" class="active">News</a>
                <a href="index.html#publications">Publications</a>
                <a href="gallery.html">Gallery</a>
            </nav>
        </div>
    </header>

    <div class="page-header">
        <h1>News</h1>
        <p class="page-subtitle">All news, updates, and activities.</p>
    </div>

    <div class="news-section-page">
        <div id="news-container-full"></div>
    </div>

    <footer>
        <p>Please always contact me :)</p>
        <p style="margin-top:0.5rem; font-size: 0.8rem;">&copy; 2026 Seonghan Kwon. All rights reserved.</p>
    </footer>

    <script>
        // 배경 파티클 코드
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;
        let mouse = { x: null, y: null, radius: 150 };

        function handleResize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
            init();
        }

        window.addEventListener('resize', handleResize);
        window.addEventListener('mousemove', function (e) { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('mouseout', function () { mouse.x = undefined; mouse.y = undefined; });

        class Particle {
            constructor(x, y, size, color) {
                this.x = x; this.y = y;
                this.baseX = x; this.baseY = y;
                this.size = size; this.color = color;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 0.005 + 0.002;
                this.radius = Math.random() * 10 + 5;
                this.alpha = Math.random();
                this.pulseSpeed = Math.random() * 0.02 + 0.005;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.rect(this.x, this.y, this.size, this.size);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
            update() {
                this.angle += this.speed;
                this.x = this.baseX + Math.cos(this.angle) * this.radius;
                this.y = this.baseY + Math.sin(this.angle) * this.radius;
                this.alpha += this.pulseSpeed;
                if (this.alpha > 1 || this.alpha < 0.2) this.pulseSpeed = -this.pulseSpeed;
                if (mouse.x) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < mouse.radius) {
                        let force = (mouse.radius - distance) / mouse.radius;
                        let directionX = dx / distance;
                        let directionY = dy / distance;
                        this.x -= directionX * force * 2;
                        this.y -= directionY * force * 2;
                    }
                }
                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            if (canvas.width <= 1) return;
            let numberOfParticles = (window.innerWidth * window.innerHeight) / 20000;
            let centerX = window.innerWidth / 2;
            let centerY = window.innerHeight / 2.8;
            let brainWidth = Math.min(window.innerWidth, window.innerHeight) * 0.45;
            let hemisphereSeparation = brainWidth * 0.25;

            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2.5) + 2;
                let color = Math.random() > 0.5 ? '#64748b' : '#94a3b8';
                let angle = Math.random() * Math.PI * 2;
                let radiusRatio = Math.sqrt(Math.random());
                let currentRadius = brainWidth * radiusRatio;
                let x = Math.cos(angle) * currentRadius;
                let y = Math.sin(angle) * currentRadius * 0.75;
                if (Math.cos(angle) > 0) x += hemisphereSeparation;
                else x -= hemisphereSeparation;
                x += (Math.random() - 0.5) * 30;
                y += (Math.random() - 0.5) * 30;
                let finalX = centerX + x;
                let finalY = centerY + y;
                if (finalX > 0 && finalX < window.innerWidth && finalY > 0 && finalY < window.innerHeight) {
                    particlesArray.push(new Particle(finalX, finalY, size, color));
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
            if (mouse.x && window.innerWidth > 768) {
                ctx.font = '12px "Fira Code", monospace';
                ctx.fillStyle = '#3b82f6';
                ctx.fillText(`ADDR: 0x${Math.floor(mouse.x).toString(16).toUpperCase().padStart(4, '0')}`, mouse.x + 15, mouse.y);
                ctx.fillText(`DATA: 0x${Math.floor(mouse.y).toString(16).toUpperCase().padStart(4, '0')}`, mouse.x + 15, mouse.y + 15);
            }
        }

        function connect() {
            let maxDistance = (window.innerWidth / 7) * (window.innerHeight / 7);
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) ** 2) + ((particlesArray[a].y - particlesArray[b].y) ** 2);
                    if (distance < maxDistance) {
                        let opacityValue = 1 - (distance / maxDistance);
                        ctx.strokeStyle = 'rgba(100, 116, 139,' + (opacityValue * 0.45) + ')';
                        ctx.lineWidth = 0.6;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x + particlesArray[a].size / 2, particlesArray[a].y + particlesArray[a].size / 2);
                        ctx.lineTo(particlesArray[b].x + particlesArray[b].size / 2, particlesArray[a].y + particlesArray[a].size / 2);
                        ctx.lineTo(particlesArray[b].x + particlesArray[b].size / 2, particlesArray[b].y + particlesArray[b].size / 2);
                        ctx.stroke();
                    }
                }
                if (mouse.x != undefined) {
                    let dx = mouse.x - particlesArray[a].x;
                    let dy = mouse.y - particlesArray[a].y;
                    let distance = (dx * dx) + (dy * dy);
                    if (distance < mouse.radius * mouse.radius) {
                        let opacity = 1 - distance / (mouse.radius * mouse.radius);
                        ctx.strokeStyle = 'rgba(59, 130, 246,' + opacity * 0.8 + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(mouse.x, mouse.y);
                        ctx.lineTo(particlesArray[a].x + particlesArray[a].size / 2, particlesArray[a].y + particlesArray[a].size / 2);
                        ctx.stroke();
                    }
                }
            }
        }

        handleResize();
        animate();
        window.addEventListener('load', handleResize);

        // 뉴스 데이터 로드 및 렌더링
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('news-container-full');
                if (data.news && container) {
                    data.news.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'news-item';
                        const contentHtml = item.link
                            ? `<a href="${item.link}" target="_blank" class="news-link">${item.content} ↗</a>`
                            : `<span class="news-content">${item.content}</span>`;

                        let badgesHtml = '';
                        if (item.badges && item.badges.length > 0) {
                            const badges = item.badges.map(b => `<a href="${b.url}" ${b.url.startsWith('http') ? 'target="_blank"' : ''} class="badge-link">${b.text}</a>`).join('');
                            badgesHtml = `<div class="news-badges">${badges}</div>`;
                        }

                        div.innerHTML = `
                            <span class="news-date">${item.date}</span>
                            <div class="news-body">
                                ${contentHtml}
                                ${badgesHtml}
                            </div>
                        `;
                        container.appendChild(div);
                    });
                }
            })
            .catch(error => console.error('Error loading news data:', error));
    </script>
</body>

</html>
